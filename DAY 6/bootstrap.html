<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            background: linear-gradient(135deg,#dbeafe,#f3e8ff);
            font-family: Arial, Helvetica, sans-serif;
        }

        h2{
            color:#4f46e5;
            font-weight:bold;
        }

        #search{
            border-radius:30px;
            padding:12px;
            border:2px solid #4f46e5;
        }

        .item{
            margin-bottom:20px;
        }

        .student-card{
            border:none;
            border-radius:15px;
            transition:0.4s;
        }

        .student-card:hover{
            transform:translateY(-8px);
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .card-body{
            text-align:center;
        }

        h4{
            color:#0d6efd;
            font-weight:bold;
        }

        .btn-primary{
            border-radius:20px;
            padding:8px 20px;
        }

        .details{
            background:#f8f9fa;
            border-radius:10px;
            padding:10px;
            display:none;
        }

    </style>

</head>

<body>

<script>

fetch('https://jsonplaceholder.typicode.com/users')
.then(res => res.json())
.then(data => {

    console.log(data);

    let usernames = data.map(user => user.username);

    console.log(usernames);

});

</script>

<div class="container py-5">

    <h2 class="text-center mb-4">Student Records</h2>

    <input
        type="text"
        id="search"
        class="form-control mb-4"
        placeholder="Search Student">

    <div id="container" class="row"></div>

</div>

<script>

const students = [

    {name:"Mamta",branch:"CSE",cgpa:8.8},
    {name:"Pratiksha",branch:"ECE",cgpa:8.1},
    {name:"Gita",branch:"EC",cgpa:8.9},
    {name:"Simran",branch:"IT",cgpa:8.2},
    {name:"Bhoomi",branch:"IoT",cgpa:8.8},
    {name:"Aman",branch:"Civil",cgpa:8.8},
    {name:"Ankit",branch:"IT",cgpa:8.8},
    {name:"Mohit",branch:"CSE",cgpa:8.8},
    {name:"Anu",branch:"CSE",cgpa:8.8},
    {name:"Garima",branch:"CSE",cgpa:8.8}

];

let html = "";

students.forEach(student => {

html += `

<div class="col-md-4 item">

    <div class="card student-card shadow">

        <div class="card-body">

            <h4>${student.name}</h4>

            <button class="btn btn-primary mt-2">
                Show Details
            </button>

            <div class="details mt-3">

                <p><strong>Branch:</strong> ${student.branch}</p>

                <p><strong>CGPA:</strong> ${student.cgpa}</p>

            </div>

        </div>

    </div>

</div>

`;

});

document.getElementById("container").innerHTML = html;

// Show / Hide Details
$(document).on("click",".btn-primary",function(){

    $(this).next(".details").slideToggle();

});

// Search Student
$("#search").keyup(function(){

    let value = $(this).val().toLowerCase();

    $(".item").each(function(){

        let name = $(this).find("h4").text().toLowerCase();

        if(name.includes(value)){

            $(this).show();

        }else{

            $(this).hide();

        }

    });

});

</script>

</body>
</html>
