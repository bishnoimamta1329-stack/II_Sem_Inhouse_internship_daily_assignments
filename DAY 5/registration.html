<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pravah'26 Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Pravah Banner -->
    <div class="banner">
        <!-- Replace this image with your own Pravah banner -->
        <img src="images.jpg" alt="Pravah Banner">
    </div>

    <h1>PRAVAH'26</h1>
    <h3>SKIT Jaipur Annual Cultural Fest</h3>

    <p class="about">
        Welcome to <strong>Pravah'26</strong>, the biggest 7-day cultural festival of SKIT Jaipur.
        Participate in exciting competitions, showcase your talent, win exciting prizes,
        and make unforgettable memories with students from different colleges.
    </p>

    <form>

        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>College Name</label>
        <input type="text" placeholder="Enter College Name" required>

        <label>Branch</label>
        <select required>
            <option>Select Branch</option>
            <option>CSE</option>
            <option>CSE(AI)</option>
            <option>IT</option>
            <option>ECE</option>
            <option>Electrical</option>
            <option>Mechanical</option>
            <option>Civil</option>
        </select>

        <label>Year</label>
        <select required>
            <option>Select Year</option>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
        </select>

        <label>Email</label>
        <input type="email" placeholder="Enter Email" required>

        <label>Mobile Number</label>
        <input type="tel" placeholder="Enter Mobile Number" required>

        <label>Gender</label>
        <select required>
            <option>Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>Select Event</label>

        <select required>
            <option>Select Event</option>

            <option>Solo Dance</option>
            <option>Group Dance</option>
            <option>Singing</option>
            <option>Battle of Bands</option>
            <option>Fashion Show</option>
            <option>Rangoli</option>
            <option>Mehendi</option>
            <option>Face Painting</option>
            <option>Photography</option>
            <option>Treasure Hunt</option>

        </select>

        <label>Upload College ID</label>
        <input type="file">

        <button type="submit">Register Now</button>

    </form>

</div>

</body>
</html>
